name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build g++-12
        sudo apt-get install -y libpthread-stubs0-dev

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_TESTS=ON \
          -G Ninja \
          -DCMAKE_CXX_COMPILER=g++-12

    - name: Build
      run: cmake --build build --parallel

    - name: Run tests
      run: ./build/tests/apeiron-tests

    - name: Test CLI
      run: |
        ./build/src/cli/apeiron-cli --version
        ./build/src/cli/apeiron-cli --help
        ./build/src/cli/apeiron-cli -c 50 -v

  build-windows:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -G "Visual Studio 17 2022"

    - name: Build
      run: cmake --build build --config Release --parallel

    - name: Run tests
      run: .\build\tests\Release\apeiron-tests.exe

  build-macos:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build --parallel

    - name: Run tests
      run: ./build/tests/apeiron-tests

  code-quality:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format-15 clang-tidy-15

    - name: Check formatting
      run: |
        find src tests -name "*.cpp" -o -name "*.h" | xargs clang-format-15 --dry-run --Werror

    - name: Static analysis
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON \
          -DCMAKE_CXX_CLANG_TIDY="clang-tidy-15;-warnings-as-errors=*"
        cmake --build build 2>&1 | head -100
